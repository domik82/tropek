services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: tropek
      DOCKER_INFLUXDB_INIT_BUCKET: slo_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: tropek-dev-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

  timescaledb-metrics:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: metrics
      POSTGRES_PASSWORD: metrics
      POSTGRES_DB: slo_metrics
    ports:
      - "5534:5432"
    volumes:
      - timescaledb-metrics-data:/var/lib/postgresql/data
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - influxdb
      - timescaledb-metrics
    restart: unless-stopped

  generator:
    build:
      context: ./generator
    depends_on:
      - influxdb
      - timescaledb-metrics
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: tropek-dev-token
      INFLUXDB_ORG: tropek
      INFLUXDB_BUCKET: slo_metrics
      TIMESCALEDB_DSN: postgresql://metrics:metrics@timescaledb-metrics:5432/slo_metrics
    command:
      - "--timeline"
      - "/timelines/quick-test.yaml"
      - "--backends"
      - "prometheus"
      - "--backends"
      - "influxdb"
      - "--backends"
      - "timescaledb"
      - "--run-promtool"
      - "--prometheus-data-dir"
      - "/prometheus"
    volumes:
      - prometheus-data:/prometheus
      - ./timelines:/timelines:ro
      - ./output:/app/output

volumes:
  prometheus-data:
  influxdb-data:
  timescaledb-metrics-data:
  grafana-data:
