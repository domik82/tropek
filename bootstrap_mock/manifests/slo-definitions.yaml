api_version: tropek/v1
kind: SLO
metadata:
  name: http-availability-slo
  display_name: HTTP Availability SLO
  author: bootstrap
  notes: Covers P99 latency, error rate, and availability for HTTP services.
spec:
  sli_name: http-service-sli
  sli_version: 1
  kind: standard
  total_score:
    pass_threshold: 90.0
    warning_threshold: 75.0
  objectives:
    - sli: response_time_p99
      display_name: "Response Time P99 (ms)"
      pass_threshold: ["<500"]
      warning_threshold: ["<800"]
      weight: 2
    - sli: error_rate
      display_name: "Error Rate"
      pass_threshold: ["<0.01"]
      warning_threshold: ["<0.05"]
      weight: 3
      key_sli: true
    - sli: availability
      display_name: "Availability"
      pass_threshold: [">=0.999"]
      warning_threshold: [">=0.99"]
      weight: 2
---
