api_version: tropek/v1
kind: SLO
metadata:
  name: http-availability-slo
  display_name: HTTP Availability SLO
  author: bootstrap
  notes: Covers P99 latency, error rate, and availability for HTTP services.
spec:
  sli_name: http-service-sli
  sli_version: 1
  kind: standard
  total_score:
    pass_pct: 90.0
    warning_pct: 75.0
  objectives:
    - sli: response_time_p99
      display_name: "Response Time P99 (ms)"
      pass_criteria: ["<500"]
      warning_criteria: ["<800"]
      weight: 2
    - sli: error_rate
      display_name: "Error Rate"
      pass_criteria: ["<0.01"]
      warning_criteria: ["<0.05"]
      weight: 3
      key_sli: true
    - sli: availability
      display_name: "Availability"
      pass_criteria: [">=0.999"]
      warning_criteria: [">=0.99"]
      weight: 2
---
api_version: tropek/v1
kind: SLO
metadata:
  name: db-performance-slo
  display_name: Database Performance SLO
  author: bootstrap
  notes: Covers query latency and connection saturation for PostgreSQL instances.
spec:
  sli_name: db-sli
  sli_version: 1
  kind: standard
  total_score:
    pass_pct: 90.0
    warning_pct: 75.0
  objectives:
    - sli: query_latency_p99
      display_name: "Query Latency P99 (ms)"
      pass_criteria: ["<100"]
      warning_criteria: ["<250"]
      weight: 2
      key_sli: true
    - sli: connection_saturation
      display_name: "Connection Saturation"
      pass_criteria: ["<0.7"]
      warning_criteria: ["<0.85"]
      weight: 1
---
