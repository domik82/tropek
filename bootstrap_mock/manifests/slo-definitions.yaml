api_version: tropek/v1
kind: SLO
metadata:
  name: agg-latency-slo
  display_name: Aggregated Latency SLO
  author: bootstrap
  notes: Quality gate for aggregated latency statistics (mean, p95, p99, max).
spec:
  sli_name: agg-latency-sli
  sli_version: 1
  kind: standard
  total_score:
    pass_pct: 90.0
    warning_pct: 75.0
  objectives:
    - sli: agg-latency-sli.mean
      display_name: "Mean Latency"
      pass_criteria: ["<500"]
      warning_criteria: ["<800"]
      weight: 2
    - sli: agg-latency-sli.p95
      display_name: "P95 Latency"
      pass_criteria: ["<1000"]
      warning_criteria: ["<1500"]
      weight: 2
    - sli: agg-latency-sli.p99
      display_name: "P99 Latency"
      pass_criteria: ["<2000"]
      warning_criteria: ["<3000"]
      weight: 1
    - sli: agg-latency-sli.max
      display_name: "Max Latency"
      pass_criteria: ["<5000"]
      warning_criteria: ["<8000"]
      weight: 1
---
api_version: tropek/v1
kind: SLO
metadata:
  name: "plugin/$__gen_process_name"
spec:
  kind: template
  sli_name: plugin-metrics-sli
  sli_version: 1
  display_name: "Plugin Health — $__gen_process_name"
  variables:
    process_name: "$__gen_process_name"
    AGGREGATION_WINDOW: "5m"
  objectives:
    - sli: cpu_usage
      pass_criteria: ["<80"]
      warning_criteria: ["<90"]
      weight: 1
      key_sli: true
    - sli: memory_usage
      pass_criteria: ["<1073741824"]
      weight: 1
  tags:
    category: plugin-health
