# SLO definitions — criteria and scoring rules.
# The indicators block inside slo_yaml must list the same keys used in the
# paired SLI definition (http-service-sli / db-sli above) so the parser
# can validate that every objective references a known indicator.

api_version: tropek/v1
kind: SLO
metadata:
  name: http-availability-slo
  display_name: HTTP Availability SLO
  author: bootstrap
  notes: Covers P99 latency, error rate, and availability for HTTP services.
spec:
  slo_yaml: |
    spec_version: '1.0'
    indicators:
      response_time_p99: 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))'
      error_rate: 'rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])'
      availability: 'avg_over_time(up[5m])'
    objectives:
      - sli: response_time_p99
        displayName: "Response Time P99 (ms)"
        pass:
          - criteria: ["<500"]
        warning:
          - criteria: ["<800"]
        weight: 2
      - sli: error_rate
        displayName: "Error Rate"
        pass:
          - criteria: ["<0.01"]
        warning:
          - criteria: ["<0.05"]
        weight: 3
        key_sli: true
      - sli: availability
        displayName: "Availability"
        pass:
          - criteria: [">=0.999"]
        warning:
          - criteria: [">=0.99"]
        weight: 2
    total_score:
      pass: "90%"
      warning: "75%"
---
api_version: tropek/v1
kind: SLO
metadata:
  name: db-performance-slo
  display_name: Database Performance SLO
  author: bootstrap
  notes: Covers query latency and connection saturation for PostgreSQL instances.
spec:
  slo_yaml: |
    spec_version: '1.0'
    indicators:
      query_latency_p99: 'histogram_quantile(0.99, rate(pg_query_duration_seconds_bucket[5m]))'
      connection_saturation: 'pg_stat_activity_count / pg_settings_max_connections'
    objectives:
      - sli: query_latency_p99
        displayName: "Query Latency P99 (ms)"
        pass:
          - criteria: ["<100"]
        warning:
          - criteria: ["<250"]
        weight: 2
        key_sli: true
      - sli: connection_saturation
        displayName: "Connection Saturation"
        pass:
          - criteria: ["<0.7"]
        warning:
          - criteria: ["<0.85"]
        weight: 1
    total_score:
      pass: "90%"
      warning: "75%"
