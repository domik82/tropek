# SLI definitions — reusable, versioned sets of indicator queries.
# Each name here (response_time_p99, error_rate, …) must match the
# indicator keys in the paired SLO definition's YAML.
#
# Template variables ($var) are resolved at evaluation time from:
#   1. Asset labels (e.g. $job, $namespace, $instance)
#   2. Evaluation metadata (caller-provided in POST /evaluations)
#   3. Reserved: $asset_name, $evaluation_name, $start, $end

api_version: tropek/v1
kind: SLI
metadata:
  name: http-service-sli
  display_name: HTTP Service Indicators
  author: bootstrap
  notes: Standard latency, error-rate and availability indicators for HTTP services.
spec:
  adapter_type: prometheus
  indicators:
    response_time_p99: 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="$job",namespace="$namespace"}[5m]))'
    error_rate: 'rate(http_requests_total{job="$job",namespace="$namespace",status=~"5.."}[5m]) / rate(http_requests_total{job="$job",namespace="$namespace"}[5m])'
    availability: 'avg_over_time(up{job="$job",namespace="$namespace"}[5m])'
---
api_version: tropek/v1
kind: SLI
metadata:
  name: db-sli
  display_name: PostgreSQL Indicators
  author: bootstrap
  notes: Query latency and connection saturation indicators for PostgreSQL.
spec:
  adapter_type: prometheus
  indicators:
    query_latency_p99: 'histogram_quantile(0.99, rate(pg_query_duration_seconds_bucket{instance="$instance"}[5m]))'
    connection_saturation: 'pg_stat_activity_count{instance="$instance"} / pg_settings_max_connections{instance="$instance"}'
---
api_version: tropek/v1
kind: SLI
metadata:
  name: vm-resources-sli
  display_name: VM Resource Indicators
  author: bootstrap
  notes: CPU, memory, disk and network indicators for Linux/Windows VMs via node_exporter.
  tags:
    domain: infrastructure
    category: compute-resources
    os: linux
spec:
  adapter_type: prometheus
  indicators:
    cpu_usage_pct: '100 - (avg(rate(node_cpu_seconds_total{instance="$instance",mode="idle"}[5m])) * 100)'
    memory_usage_pct: '(1 - node_memory_MemAvailable_bytes{instance="$instance"} / node_memory_MemTotal_bytes{instance="$instance"}) * 100'
    disk_usage_pct: '(1 - node_filesystem_avail_bytes{instance="$instance",mountpoint="/"} / node_filesystem_size_bytes{instance="$instance",mountpoint="/"}) * 100'
    disk_io_rate: 'rate(node_disk_io_time_seconds_total{instance="$instance"}[5m])'
    network_in_rate: 'rate(node_network_receive_bytes_total{instance="$instance",device="eth0"}[5m])'
    network_out_rate: 'rate(node_network_transmit_bytes_total{instance="$instance",device="eth0"}[5m])'
---
api_version: tropek/v1
kind: SLI
metadata:
  name: process-resources-sli
  display_name: Process Resource Indicators
  author: bootstrap
  notes: Per-process CPU, memory, handle and I/O indicators via windows_exporter.
  tags:
    domain: endpoint-monitoring
    category: process-resources
    os: windows
spec:
  adapter_type: prometheus
  indicators:
    process_cpu_pct: 'rate(windows_process_cpu_time_total{instance="$host",process="$process_name"}[5m]) * 100'
    process_memory_mb: 'windows_process_working_set_bytes{instance="$host",process="$process_name"} / 1048576'
    process_handles: 'windows_process_handle_count{instance="$host",process="$process_name"}'
    process_io_bytes: 'rate(windows_process_io_bytes_total{instance="$host",process="$process_name"}[5m])'
---
api_version: tropek/v1
kind: SLI
metadata:
  name: agg-latency-sli
  display_name: Aggregated Latency Indicators
  author: bootstrap
  notes: Aggregated-mode SLI for latency statistics using query_range + statistical methods.
spec:
  adapter_type: prometheus
  mode: aggregated
  query_template: 'http_request_duration_seconds{job="$job",namespace="$namespace"}'
  interval: '1m'
  methods: ['mean', 'p95', 'p99', 'max']
---
api_version: tropek/v1
kind: SLI
metadata:
  name: process-cpu-agg
  display_name: Process CPU (Aggregated)
  author: bootstrap
  notes: Aggregated-mode SLI for per-process CPU — computes mean, p99, and max from time-series data.
  tags:
    domain: endpoint-monitoring
    mode: aggregated
spec:
  adapter_type: prometheus
  mode: aggregated
  query_template: 'rate(windows_process_cpu_time_total{instance="$host",process="$process_name"}[$interval]) * 100'
  interval: 1m
  methods:
    - mean
    - p99
    - max
---
api_version: tropek/v1
kind: SLI
metadata:
  name: plugin-metrics-sli
spec:
  adapter_type: prometheus
  display_name: Plugin Process Metrics
  indicators:
    cpu_usage: "rate(process_cpu_seconds_total{process_name='$process_name'}[$AGGREGATION_WINDOW])"
    memory_usage: "process_resident_memory_bytes{process_name='$process_name'}"
  tags:
    category: resources
    platform: linux
---
# ---- Binding Test SLI ----

api_version: tropek/v1
kind: SLI
metadata:
  name: binding-test-sli
  display_name: Binding Test Indicators
  author: bootstrap
  notes: Minimal SLI for binding resolution tests.
spec:
  adapter_type: prometheus
  indicators:
    response_time_ms: 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="$job",namespace="$namespace"}[5m]))'
    error_count: 'increase(http_requests_total{job="$job",namespace="$namespace",status=~"5.."}[5m])'
---
# ---- Scale Test SLI ----

api_version: tropek/v1
kind: SLI
metadata:
  name: lab-process-sli
  display_name: Lab Process Indicators
  author: bootstrap
  notes: 8-indicator SLI for scale testing template explosion scenarios.
spec:
  adapter_type: prometheus
  indicators:
    cpu_pct: 'rate(process_cpu_seconds_total{job="$job",process="$process_name"}[5m]) * 100'
    memory_mb: 'process_resident_memory_bytes{job="$job",process="$process_name"} / 1048576'
    handles: 'process_open_fds{job="$job",process="$process_name"}'
    io_bytes_sec: 'rate(process_io_bytes_total{job="$job",process="$process_name"}[5m])'
    threads: 'process_threads{job="$job",process="$process_name"}'
    gc_pause_ms: 'process_gc_pause_seconds_total{job="$job",process="$process_name"} * 1000'
    heap_mb: 'process_heap_bytes{job="$job",process="$process_name"} / 1048576'
    open_files: 'process_open_fds{job="$job",process="$process_name"}'
