# Groups with members and subgroups.
# Order matters: child groups must appear before parent groups that reference them.

api_version: tropek/v1
kind: AssetGroup
metadata:
  name: infra-production
  display_name: Production
spec:
  members:
    - asset_name: checkout-api
      weight: 1.0
    - asset_name: product-catalog
      weight: 1.0
    - asset_name: user-service
      weight: 1.0
    - asset_name: orders-db
      weight: 1.0
    - asset_name: catalog-db
      weight: 1.0
    - asset_name: payment-gateway
      weight: 1.0
    - asset_name: bastion-host
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: infra-staging
  display_name: Staging
spec:
  members:
    - asset_name: log-aggregator
      weight: 1.0
    - asset_name: build-runner
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: infra-monitoring
  display_name: Monitoring
spec:
  members:
    - asset_name: metrics-collector
      weight: 1.0
    - asset_name: log-aggregator
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: core-services
  display_name: Core Services
spec:
  members:
    - asset_name: checkout-api
      weight: 1.0
    - asset_name: product-catalog
      weight: 1.0
    - asset_name: user-service
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: data-tier
  display_name: Data Tier
spec:
  members:
    - asset_name: orders-db
      weight: 1.0
    - asset_name: catalog-db
      weight: 1.0
    - asset_name: session-cache
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: infrastructure
  display_name: Infrastructure
spec:
  subgroups:
    - group_name: infra-production
      weight: 1.0
    - group_name: infra-staging
      weight: 1.0
    - group_name: infra-monitoring
      weight: 1.0
---
api_version: tropek/v1
kind: AssetGroup
metadata:
  name: ecommerce-prod
  display_name: E-Commerce Production
spec:
  subgroups:
    - group_name: core-services
      weight: 1.0
    - group_name: data-tier
      weight: 1.0
