# SLO Bindings — new polymorphic model (replaces AssetSLOLink / AssetGroupSLOLink).
# target_type: "asset" or "asset_group"
# target_name: the asset or group name (resolved to ID by bootstrap)

# ---- E-Commerce: existing services ----

api_version: tropek/v1
kind: SLOBinding
metadata:
  name: checkout-api-http-binding
spec:
  target_type: asset
  target_name: checkout-api
  slo_name: http-availability-slo
  data_source_name: prometheus-local
---
api_version: tropek/v1
kind: SLOBinding
metadata:
  name: product-catalog-http-binding
spec:
  target_type: asset
  target_name: product-catalog
