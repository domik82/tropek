# Bind each asset and group to SLO + SLI + datasource.
# asset_name / group_name must already exist (created above).

# --- Asset SLO links ---

api_version: tropek/v1
kind: AssetSLOLink
metadata:
  name: checkout-api-http
spec:
  asset_name: checkout-api
  slo_name: http-availability-slo
  sli_name: http-service-sli
  data_source_name: prometheus-local
---
api_version: tropek/v1
kind: AssetSLOLink
metadata:
  name: product-catalog-http
spec:
  asset_name: product-catalog
  slo_name: http-availability-slo
  sli_name: http-service-sli
  data_source_name: prometheus-local
---
api_version: tropek/v1
kind: AssetSLOLink
metadata:
  name: user-service-http
spec:
  asset_name: user-service
  slo_name: http-availability-slo
  sli_name: http-service-sli
  data_source_name: prometheus-local
---
api_version: tropek/v1
kind: AssetSLOLink
metadata:
  name: orders-db-perf
spec:
  asset_name: orders-db
  slo_name: db-performance-slo
  sli_name: db-sli
  data_source_name: prometheus-local

# --- Asset group SLO links ---
# Note: core-services-http and data-tier-db are now bound via SLOBinding (slo-bindings.yaml)
# using the new polymorphic model to avoid unique constraint violations.

---
api_version: tropek/v1
kind: AssetSLOLink
metadata:
  name: checkout-api-agg-latency
spec:
  asset_name: checkout-api
  slo_name: agg-latency-slo
  sli_name: agg-latency-sli
  data_source_name: prometheus-local
