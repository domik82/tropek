# SLO Groups — generate SLOs from templates via variable expansion.

api_version: tropek/v1
kind: SLOGroup
metadata:
  name: app-x-plugins
spec:
  display_name: App-X Plugin Monitoring
  template_slo_name: "plugin/$__gen_process_name"
  template_slo_version: 1
  gen_variables:
    process_name: ["auth", "cache", "db"]
  tags:
    app: app-x
---
# Combined example: SLO Groups + Aggregated-mode SLI.
# Each generated SLO evaluates mean/p99/max for one process via the aggregated adapter.
api_version: tropek/v1
kind: SLOGroup
metadata:
  name: process-cpu-agg-group
spec:
  display_name: Process CPU Aggregated Monitoring
  template_slo_name: "cpu-agg/$__gen_process_name"
  template_slo_version: 1
  gen_variables:
    process_name: ["auth", "cache", "db", "worker"]
  tags:
    category: cpu-aggregated
---
# ---- Binding Test SLO Groups ----

api_version: tropek/v1
kind: SLOGroup
metadata:
  name: tmpl-health-group
spec:
  display_name: Template Health Group
  template_slo_name: "tmpl-health/$__gen_process_name"
  template_slo_version: 1
  gen_variables:
    process_name: ["alpha", "beta"]
  tags:
    purpose: binding-test
---
api_version: tropek/v1
kind: SLOGroup
metadata:
  name: dtmpl-health-group
spec:
  display_name: Direct Template Health Group
  template_slo_name: "dtmpl-health/$__gen_process_name"
  template_slo_version: 1
  gen_variables:
    process_name: ["gamma", "delta"]
  tags:
    purpose: binding-test
---
# ---- Scale Test SLO Groups ----
# 3 groups x 8 processes = 24 generated SLOs.

api_version: tropek/v1
kind: SLOGroup
metadata:
  name: lab-health-group
spec:
  display_name: Lab Health Monitoring
  template_slo_name: "lab-health/$__gen_process_name"
  template_slo_version: 1
  gen_variables:
    process_name: ["nginx", "postgres", "redis", "kafka", "etcd", "vault", "consul", "grafana"]
  tags:
    purpose: scale-test
