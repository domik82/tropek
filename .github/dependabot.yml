version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: monthly
    groups:
      react:
        patterns:
          - "*react*"
      tanstack:
        patterns:
          - "*tanstack*"
      tailwind:
        patterns:
          - "*tailwind*"
      vite:
        patterns:
          - "*vite*"
      eslint:
        patterns:
          - "*eslint*"
