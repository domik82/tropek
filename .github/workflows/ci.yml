name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'api/**'
              - 'adapters/**'
              - 'clients/python/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
              - '.github/workflows/python-checks.yml'
              - '.github/actions/setup-python/**'
            ui:
              - 'ui/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/ui-checks.yml'
              - '.github/actions/setup-ui/**'

  python:
    name: Python
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/python-checks.yml

  ui:
    name: UI
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/ui-checks.yml
