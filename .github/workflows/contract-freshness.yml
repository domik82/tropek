name: Contract Freshness

on:
  pull_request:
    paths:
      - 'api/tropek/**/*.py'
      - 'ui/src/generated/**'
      - 'api/openapi.json'
      - 'scripts/export-schema.py'
      - 'ui/package.json'
      - 'ui/pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - 'api/tropek/**/*.py'
      - 'ui/src/generated/**'
      - 'api/openapi.json'
      - 'scripts/export-schema.py'
      - 'ui/package.json'
      - 'ui/pnpm-lock.yaml'

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install API dependencies
        run: uv sync --all-extras

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: cd ui && pnpm install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Check schema and generated types are fresh
        run: just check-schema-fresh

      - name: TypeScript compile check
        run: cd ui && pnpm exec tsc --noEmit -p tsconfig.app.json
