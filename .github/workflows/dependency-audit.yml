name: Dependency Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --recursive
            .
