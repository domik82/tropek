name: Latest Images

# release.yml already re-tags :latest alongside the version tag on every
# `v*` release, so this workflow is a break-glass fallback only — e.g.
# rebuilding :latest from main without cutting a version tag.
on:
  workflow_dispatch:

permissions:
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: api
            image: tropek-api
            config_copy: true
          - context: ui
            image: tropek-ui
            config_copy: false
          - context: adapters/prometheus
            image: tropek-adapter-prometheus
            config_copy: false
    steps:
      - uses: actions/checkout@v7

      - name: Copy config.yaml into API build context
        if: matrix.config_copy
        run: cp config.yaml api/config.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
