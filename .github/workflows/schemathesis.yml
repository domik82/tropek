name: Schemathesis

on:
  pull_request:
    paths:
      - 'api/**'
      - 'adapters/**'
      - 'scripts/schemathesis-run.sh'
      - 'uv.lock'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'adapters/**'
      - 'scripts/schemathesis-run.sh'
      - 'uv.lock'
      - 'pyproject.toml'

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: tropek
          POSTGRES_PASSWORD: tropek_test
          POSTGRES_DB: tropek_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tropek -d tropek_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TK_DB_USER: tropek
      TK_DB_PASSWORD: tropek_test
      TK_SECRET_KEY: test-secret-key
      TK_REDIS_PASSWORD: ''
      TEST_DATABASE_URL: postgresql+asyncpg://tropek:tropek_test@localhost:5433/tropek_test
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Apply test DB migrations
        run: just migrate-test

      - name: Run Schemathesis
        run: just test-schema
