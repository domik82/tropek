[tool.uv]
reinstall-package = ["tropek-api", "tropek-adapter-prometheus"]

[tool.uv.workspace]
members = [
    "api",
    "adapters/prometheus",
    "clients/python",
]

[tool.ruff]
line-length = 100
target-version = "py313"
# Exclude specific directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".venv",
    "__pycache__",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "D",     # pydocstyle
    "S",     # flake8-bandit (security)
    "DTZ",   # flake8-datetimez (timezone-aware datetimes)
    "RUF",   # ruff-native rules
    "PT",    # flake8-pytest-style
    "C90",   # McCabe complexity
    "PERF",  # perflint
    "TRY",   # tryceratops (exception handling)
]
ignore = [
    "E501",    # line too long — handled by ruff format
    "D104",    # missing docstring in public package (__init__.py)
    "D105",    # missing docstring in magic method
    "D107",    # missing docstring in __init__
    "S101",    # use of assert — required in tests
    "TRY003",  # long exception messages — we use these intentionally for clarity
    "TRY300",  # consider moving return into else — stylistic, disagree
    "S105",    # hardcoded password — false positive on enum values like PASS = "pass"
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Test function names are self-documenting — docstrings add noise, not value
"**/tests/**" = ["D"]
"**/test_*.py" = ["D"]
"**/alembic/versions/*.py" = ["D", "W291", "E501"]
"observability_stack/**" = ["D", "S", "C901", "SIM115", "RUF002", "RUF003", "RUF005"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
plugins = ["sqlalchemy.ext.mypy.plugin"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["api/tests", "adapters/prometheus/tests"]
pythonpath = ["api", "adapters/prometheus", "clients/python"]   # makes 'app' importable from workspace root
markers = [
    "integration: requires a running TimescaleDB instance (deselect with -m 'not integration')",
]

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest-dotenv>=0.5.2",
]
