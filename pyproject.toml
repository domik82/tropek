[tool.uv]
reinstall-package = ["tropek-api", "tropek-adapter-prometheus", "tropek-adapter-protocol"]

[tool.uv.workspace]
members = [
    "api",
    "adapters/prometheus",
    "adapters/protocol",
    "clients/python",
]

[tool.ruff]
line-length = 120
target-version = "py313"
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".venv",
    "__pycache__",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade (includes f-string enforcement via UP032)
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "D",     # pydocstyle
    "S",     # flake8-bandit (security)
    "DTZ",   # flake8-datetimez (timezone-aware datetimes)
    "RUF",   # ruff-native rules
    "PT",    # flake8-pytest-style
    "C90",   # McCabe complexity
    "C4",    # flake8-comprehensions (list/dict/set comprehension misuse)
    "PERF",  # perflint
    "TRY",   # tryceratops (exception handling)
    "PLC",   # pylint convention (import placement)
    "PLR",   # pylint refactor (too-many-args/branches/statements)
    "BLE",   # blind-except
    "A",     # flake8-builtins (shadowed builtins: id, type, list, ...)
    "ISC",   # flake8-implicit-str-concat
    "RET",   # flake8-return (unnecessary else, missing explicit return)
    "G",     # flake8-logging-format
    "TC",    # flake8-type-checking (TYPE_CHECKING imports)
]
ignore = [
    # Formatter owns line length — un-wrappable lines (long strings, URLs) are fine
    "E501",
    # __init__.py, magic methods, and __init__ are self-documenting by convention
    "D104", "D105", "D107",
    # assert is valid in application code (e.g. narrowing types); tests are covered by per-file-ignores
    "S101",
    # We write descriptive exception messages inline — extracting to a variable adds noise
    "TRY003",
    # Moving a return into an else branch is not always clearer; we decide case by case
    "TRY300",
    # False positive: status enum values like PASS = "pass" trip the hardcoded-password rule
    "S105",
    # PLR0913 (too-many-arguments) already covers this; PLR0917 is redundant
    "PLR0917",
    # ISC001 (implicit concat on one line) conflicts with ruff formatter — must be off
    "ISC001",
    # f-strings in logging are fine; the lazy-% micro-optimisation is not worth it here
    "G004",
    # Assigning before return is often intentional (naming the value aids debugging)
    "RET504",
    # TODO: TC (flake8-type-checking) requires moving runtime imports into TYPE_CHECKING blocks.
    # This is a widespread structural change (~200+ violations across the codebase) that needs
    # a dedicated pass to do safely — skipping for now to keep this refactor focused.
    "TC001", "TC002", "TC003",
]

[tool.ruff.lint.pydocstyle]
# Google style: Args/Returns/Raises sections, no blank line before class docstring
convention = "google"

[tool.ruff.format]
# Formatter enforces single quotes — keeps Q lint rules out of the picture
quote-style = "single"
# Alembic migrations are auto-generated — don't impose formatter style on them.
exclude = ["**/alembic/versions/*.py"]

[tool.ruff.lint.pylint]
# Raise the default (5) to accommodate FastAPI dependencies injected via Depends()
max-args = 8

[tool.ruff.lint.per-file-ignores]
# Tests: no docstrings, asserts allowed, fixtures look unused, magic numbers in assertions are fine
"**/tests/**" = ["D", "S101", "S106", "ARG", "PLR2004"]
"**/test_*.py" = ["D", "S101", "S106", "ARG", "PLR2004"]
# Alembic auto-generated migrations: formatting is Alembic's job, not ours
"**/alembic/versions/*.py" = ["D", "W291", "E501", "PLR0915"]
# Pydantic schemas: RUF012 (mutable defaults) is a false positive — Pydantic v2
# deep-copies field defaults per-instance, so {}/[] on BaseModel fields is safe.
"**/schemas.py" = ["RUF012"]
"**/schemas/*.py" = ["RUF012"]
# Observability stack is third-party-adjacent config — don't enforce our style on it
"observability_stack/**" = ["D", "S", "C901", "SIM115", "RUF002", "RUF003", "RUF005"]
# FastAPI uses Depends() as a default argument — B008 (mutable default) is a false positive here
"**/router.py" = ["B008", "PLR0913"]
# Vendored Apache Otava engine — variable names (Q, V, H, A, B, C) follow the paper's notation
"**/change_points/engine/*.py" = ["N802", "N806", "PLR2004"]
"**/tests/change_points/**/test_*.py" = ["N806"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
plugins = ["sqlalchemy.ext.mypy.plugin"]


[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["api/tests", "adapters/prometheus/tests"]
pythonpath = ["api", "adapters/prometheus", "adapters/protocol", "clients/python"]
markers = [
    "integration: requires a running TimescaleDB instance (deselect with -m 'not integration')",
    "e2e: requires running adapter + Prometheus + Redis (deselect with -m 'not e2e')",
    "schemathesis: property-based OpenAPI conformance tests",
]

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest-dotenv>=0.5.2",
]
