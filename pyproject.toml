[tool.uv.workspace]
members = [
    "api",
    "adapters/prometheus",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "D"]
ignore = [
    "E501",   # line too long — handled by ruff format
    "D104",   # missing docstring in public package (__init__.py)
    "D105",   # missing docstring in magic method
    "D107",   # missing docstring in __init__
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
# Test function names are self-documenting — docstrings add noise, not value
"**/tests/**" = ["D"]
"**/test_*.py" = ["D"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["api/tests", "adapters/prometheus/tests"]
pythonpath = ["api", "adapters/prometheus"]   # makes 'app' importable from workspace root

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
]
