services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${QG_DB_USER}
      POSTGRES_PASSWORD: ${QG_DB_PASSWORD}
      POSTGRES_DB: tropek
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QG_DB_USER} -d tropek"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${QG_REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${QG_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      QG_DB_USER: ${QG_DB_USER}
      QG_DB_PASSWORD: ${QG_DB_PASSWORD}
      QG_REDIS_PASSWORD: ${QG_REDIS_PASSWORD}
      QG_SECRET_KEY: ${QG_SECRET_KEY}
      QG_CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - results_data:/data/results
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["uv", "run", "arq", "tropek.worker.WorkerSettings"]
    environment:
      QG_DB_USER: ${QG_DB_USER}
      QG_DB_PASSWORD: ${QG_DB_PASSWORD}
      QG_REDIS_PASSWORD: ${QG_REDIS_PASSWORD}
      QG_SECRET_KEY: ${QG_SECRET_KEY}
      QG_CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - results_data:/data/results
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 4

  adapter-prometheus:
    build:
      context: ./adapters/prometheus
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      REDIS_URL: redis://:${QG_REDIS_PASSWORD}@redis:6379/1
      QG_ADAPTER_PROMETHEUS_USERNAME: ${QG_ADAPTER_PROMETHEUS_USERNAME:-}
      QG_ADAPTER_PROMETHEUS_PASSWORD: ${QG_ADAPTER_PROMETHEUS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy

  adapter-mock:
    build:
      context: ./adapters/mock
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./adapters/mock/data:/app/data:ro

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  timescaledb-test:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: tropek
      POSTGRES_PASSWORD: tropek_test
      POSTGRES_DB: tropek_test
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tropek -d tropek_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - test

  # --- E2E integration test infrastructure (dedicated ports, no dev conflicts) ---
  timescaledb-e2e:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: tropek_e2e
      POSTGRES_PASSWORD: tropek_e2e
      POSTGRES_DB: tropek_e2e
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tropek_e2e -d tropek_e2e"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - e2e

  redis-e2e:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass e2e_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_e2e_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "e2e_redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - e2e

volumes:
  timescaledb_data:
  redis_data:
  results_data:
  timescaledb_test_data:
  timescaledb_e2e_data:
  redis_e2e_data:
