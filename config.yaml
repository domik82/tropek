server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "timescaledb"
  port: 5432
  name: "tropek"
  pool_size: 10
  max_overflow: 20

cache:
  backend: "redis"
  host: "redis"
  port: 6379
  db: 0
  ttl_seconds:
    trend: 60
    evaluation_list: 30
    evaluation_detail: 300
    slo_definition: 600
    heatmap_column: 604800  # 7 days — safety net, invalidation is the primary mechanism
    trend_column: 604800  # 7 days — per-SLO trend fragment cache backstop

queue:
  backend: "redis"
  db_index: 1
  max_jobs: 10
  max_retries: 3
  retry_delay_seconds: 10
  job_timeout_seconds: 120
  keep_result_seconds: 3600
  # Periodic reconciler that rescues parent runs the fast-path finalize missed.
  # Interval must be a divisor of 60: 5, 10, 15, 20, 30, or 60.
  finalize_sweeper_interval_seconds: 30
  # Max parent runs scanned+rescued per sweeper tick.
  finalize_sweeper_batch_limit: 100

reliability:
  adapter_timeout_seconds: 30
  adapter_retry_attempts: 3
  adapter_retry_backoff_seconds: 2
  # Watchdog: recovers evaluations orphaned in 'running' (crashed/killed jobs). Interval
  # must divide 60: 5, 10, 15, 20, 30, or 60.
  watchdog_interval_seconds: 60
  # An eval 'running' longer than this is considered dead (must exceed job_timeout_seconds).
  stuck_job_threshold_seconds: 180
  # Recovered evals are re-enqueued up to this many times, then marked failed.
  max_stuck_job_retries: 3

evaluation:
  async_threshold_metrics: 10

quality_gate:
  # Deadlock retry for evaluation mutation actions (invalidate/restore/override/pin
  # and their batch variants). A Postgres deadlock (SQLSTATE 40P01) aborts the whole
  # transaction; the handler rolls back and re-runs with jittered exponential backoff.
  invalidate:
    max_retries: 5           # additional attempts after the first
    base_backoff_ms: 25
    max_backoff_ms: 500

adapters:
  prometheus:
    url: "http://adapter-prometheus:8080"
    timeout_seconds: 30
  max_concurrent_queries_per_adapter: 10

db_writer:
  workers: 5
  batch_size: 100

file_ingestion:
  allowed_path_prefix: "/data/results"
  max_file_size_mb: 50

ui:
  max_evaluations: 1000
  page_size: 200
  heatmap_slo_groups_expanded_by_default: true
  data_start_date: "2024-01-01"

logging:
  level: "INFO"
  format: "json"
