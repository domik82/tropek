# Three objectives: weighted scoring, key_sli veto, and informational-only SLI.
objectives:
  - sli: m1
    display_name: "Response Time"
    pass_threshold: ["<100"]
    warning_threshold: ["<200"]
    weight: 2
    key_sli: false
  - sli: m2
    display_name: "Error Count (key)"
    pass_threshold: ["<50"]
    weight: 1
    key_sli: true
  - sli: m3
    display_name: "Info Only — no pass criteria"
    weight: 1
total_score:
  pass_threshold: 90.0
  warning_threshold: 75.0
