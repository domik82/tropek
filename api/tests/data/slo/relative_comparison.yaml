comparison:
  compare_with: several_results
  number_of_comparison_results: 3
  include_result_with_score: pass_or_warn
  aggregate_function: avg
  scope_tags: [os, arch]
objectives:
  - sli: cpu_usage
    pass_threshold: ["<=+10%"]
    warning_threshold: ["<=+20%"]
    weight: 2
    key_sli: true
total_score:
  pass_pct: 90.0
  warning_pct: 75.0
