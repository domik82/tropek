repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff (format)
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: mypy (type check — api)
        files: ^api/app/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - sqlalchemy[asyncio]>=2.0
          - fastapi>=0.115
          - types-pyyaml
          - types-redis
      - id: mypy
        name: mypy (type check — adapter-prometheus)
        files: ^adapters/prometheus/app/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7
          - fastapi>=0.115
          - types-pyyaml
