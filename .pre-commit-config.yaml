repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint (UI — React hooks, compiler)
        entry: ./scripts/pre-commit-eslint.sh
        language: script
        files: ^ui/src/.*\.(ts|tsx)$

      - id: tsc
        name: tsc (UI — type check)
        entry: ./scripts/pre-commit-tsc.sh
        language: script
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff (format)
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: mypy (type check — api)
        files: ^api/tropek/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - sqlalchemy[asyncio]>=2.0
          - fastapi>=0.138
          - types-pyyaml
          - types-redis
      - id: mypy
        name: mypy (type check — adapter-prometheus)
        files: ^adapters/prometheus/tropek_prometheus/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7
          - fastapi>=0.138
          - types-pyyaml
          - sqlalchemy[asyncio]>=2.0
