# SLO Assignments — pin asset/group to a specific SLO + datasource.
# target_type: "asset" or "asset_group"
# target_name: the asset or group name (resolved to ID by bootstrap)
# slo_name: resolved to slo_definition_id at apply time (latest version)

# ---- E-Commerce: existing services ----

api_version: tropek/v1
kind: SLOAssignment
metadata:
  name: checkout-api-http-assignment
spec:
  target_type: asset
  target_name: checkout-api
  slo_name: http-availability-slo
  data_source_name: prometheus-local
